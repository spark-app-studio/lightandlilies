    <ellipse cx="0" cy="-6" rx="3" ry="7" fill="#E8D5F5" opacity="0.9" transform="rotate(60)"/>
    <ellipse cx="0" cy="-6" rx="3" ry="7" fill="#E8D5F5" opacity="0.9" transform="rotate(120)"/>
    <ellipse cx="0" cy="-6" rx="3" ry="7" fill="#E8D5F5" opacity="0.9" transform="rotate(180)"/>
    <ellipse cx="0" cy="-6" rx="3" ry="7" fill="#E8D5F5" opacity="0.9" transform="rotate(240)"/>
    <ellipse cx="0" cy="-6" rx="3" ry="7" fill="#E8D5F5" opacity="0.9" transform="rotate(300)"/>
