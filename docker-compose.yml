services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lilies
      POSTGRES_USER: lilies
      POSTGRES_PASSWORD: lilies_dev
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lilies"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3010:3000"
    environment:
      DATABASE_URL: postgres://lilies:lilies_dev@db:5432/lilies
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      ADMIN_SECRET: ${ADMIN_SECRET:-local-dev-secret-change-in-prod}
      RESEND_API_KEY: ${RESEND_API_KEY:-re_placeholder}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
